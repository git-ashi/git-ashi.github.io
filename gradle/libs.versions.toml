[versions]
kotlin = "1.9.22"
kobweb = "0.2.2"
compose = "1.6.0"
coroutines = "1.8.0"

[libraries]
compose-runtime = { module = "org.jetbrains.compose.runtime:runtime", version.ref = "compose" }
compose-foundation = { module = "org.jetbrains.compose.foundation:foundation", version.ref = "compose" }
compose-ui = { module = "org.jetbrains.compose.ui:ui", version.ref = "compose" }
compose-elements = { module = "org.jetbrains.compose.material3:material3", version.ref = "compose" }
kotlinx-coroutines-core = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-core", version.ref = "coroutines" }
kobweb-core = { module = "com.varabyte.kobweb:kobweb-core", version.ref = "kobweb" }
kobweb-syntax-highlight = { module = "com.varabyte.kobweb:kobweb-syntax-highlight", version.ref = "kobweb" }

[plugins]
kotlinJvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
kobweb = { id = "com.varabyte.kobweb", version.ref = "kobweb" }
